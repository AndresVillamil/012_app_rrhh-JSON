<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RRHH - Gestión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Gestión de Empleados</h1>

<form id="formEmpleado">
    <input id="nombre" placeholder="Nombre" required>
    <input type="date" id="fechaNacimiento" required>
    <input id="puesto" placeholder="Puesto" required>
    <input id="departamento" placeholder="Departamento" required>
    <input type="number" id="salario" placeholder="Salario" required>
    <input type="date" id="fechaIngreso" required>
    <button>Guardar</button>
</form>

<h2>Empleados</h2>
<div id="listaEmpleados"></div>

<hr>

<h2>Historial de cambios</h2>
<div id="historial"></div>

<hr>

<h2>Nómina mensual</h2>
<form id="formNomina">
    <select id="empleadoNomina"></select>
    <input type="month" id="periodo" required>
    <input type="number" id="horasExtras" placeholder="Horas extras">
    <input type="number" id="bonos" placeholder="Bonos">
    <input type="number" id="fondo" placeholder="Fondo empleados">
    <button>Calcular</button>
</form>


<div id="resultadoNomina"></div>
<button id="btnPdfNomina" style="display:none">🖨️ PDF nómina</button>

<h2>📜 Auditoría de Nómina</h2>
<div id="timelineAuditoria" class="timeline"></div>
<button onclick="verAuditoriaDesdeUI()">
    🕒 Ver auditoría
</button>



<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RRHH - Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>


<div class="container mt-4">
  <h1 class="text-center">Gestión de Empleados</h1>

  <form id="formEmpleado" class="card p-4 shadow">
    <input id="nombre" class="form-control mb-2" placeholder="Nombre" required>
    <input type="date" id="fechaNacimiento" class="form-control mb-2" required>

    <input id="puesto" class="form-control mb-2" placeholder="Puesto" required>
    <input id="departamento" class="form-control mb-2" placeholder="Departamento" required>

    <input type="number" id="salario" class="form-control mb-2" placeholder="Salario" required>
    <input type="date" id="fechaIngreso" class="form-control mb-3" required>

    <button class="btn btn-primary">Guardar</button>
  </form>
</div>

<h2>Empleados</h2>
<div id="listaEmpleados"></div>

<hr>

<h2>Historial de cambios</h2>
<div id="historial"></div>

<hr>

<h2>Nómina mensual</h2>
<form id="formNomina">
    <select id="empleadoNomina"></select>
    <input type="month" id="periodo" required>
    <input type="number" id="horasExtras" placeholder="Horas extras">
    <input type="number" id="bonos" placeholder="Bonos">
    <input type="number" id="fondo" placeholder="Fondo empleados">
    <button>Calcular</button>
</form>


<div id="resultadoNomina"></div>
<button id="btnPdfNomina" style="display:none">🖨️ PDF nómina</button>

<h2>📜 Auditoría de Nómina</h2>
<div id="timelineAuditoria" class="timeline"></div>
<button onclick="verAuditoriaDesdeUI()">
    🕒 Ver auditoría
</button>



<script src="app.js"></script>
</body>
</html>
